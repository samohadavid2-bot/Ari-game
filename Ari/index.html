<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>גן החיות המקשיב</title>
<style>
  /* ===== CSS Variables & Reset ===== */
  :root {
    --sky: #fff8ee;
    --grass: #6dd47e;
    --sun: #FFD93D;
    --coral: #FF6B6B;
    --blue: #4ECDC4;
    --purple: #C77DFF;
    --orange: #FF9A3C;
    --pink: #FF6EB4;
    --correct-glow: #6dd47e;
    --wrong-shake: #FF6B6B;
    --card-radius: 32px;
    --bounce-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
    background: var(--sky);
    user-select: none;
    -webkit-user-select: none;
  }

  /* ===== Layout ===== */
  #game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    height: 100dvh;
    width: 100%;
    padding: 12px 12px 8px;
    position: relative;
    overflow: hidden;
  }

  /* ===== Decorative Sky Background ===== */
  #game-wrapper::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 15%, #fffde7 0%, transparent 50%),
      radial-gradient(ellipse at 80% 10%, #fce4ec 0%, transparent 40%),
      radial-gradient(ellipse at 50% 100%, #e8f5e9 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== Header: Stars/Score ===== */
  #header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 10;
    width: 100%;
  }

  .star-badge {
    font-size: clamp(22px, 5vw, 34px);
    filter: drop-shadow(0 2px 6px rgba(255,200,0,0.5));
    transition: transform 0.3s var(--bounce-spring);
  }
  .star-badge.pop { animation: starPop 0.5s var(--bounce-spring); }

  @keyframes starPop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.8) rotate(20deg); }
    100% { transform: scale(1); }
  }

  /* ===== Instruction Banner ===== */
  #instruction-box {
    z-index: 10;
    width: 100%;
    text-align: center;
    background: #fff;
    border-radius: 28px;
    padding: 14px 18px 12px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.09);
    position: relative;
    border: 3px solid #ffe082;
  }

  #instruction-text {
    font-size: clamp(22px, 6vw, 36px);
    font-weight: 900;
    color: #333;
    letter-spacing: 0.01em;
    line-height: 1.3;
  }

  /* Speaker icon button */
  #speaker-btn {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: clamp(24px, 5vw, 32px);
    background: #fff8e1;
    border: none;
    border-radius: 50%;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    transition: transform 0.15s;
    z-index: 20;
  }
  #speaker-btn:active { transform: translateY(-50%) scale(0.9); }
  #speaker-btn.speaking { animation: pulse-speaker 0.6s ease-in-out infinite alternate; }

  @keyframes pulse-speaker {
    from { box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    to   { box-shadow: 0 3px 20px rgba(255,180,0,0.6); background: #ffe082; }
  }

  /* ===== Choices Grid ===== */
  #choices-grid {
    display: grid;
    gap: clamp(10px, 2.5vw, 20px);
    z-index: 10;
    width: 100%;
    flex: 1;
    align-content: center;
    max-height: 100%;
  }

  /* Responsive grid: 2 cols for 2 or 4 items, 3 cols for 3 items */
  #choices-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
  #choices-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }

  /* ===== Individual Choice Card ===== */
  .choice-card {
    background: #fff;
    border-radius: var(--card-radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 8px 28px rgba(0,0,0,0.10);
    border: 4px solid transparent;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    aspect-ratio: 1;
    overflow: hidden;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    padding: 8%;
  }

  .choice-card:active {
    transform: scale(0.93);
  }

  /* Emoji inside card */
  .card-emoji {
    font-size: clamp(52px, 14vw, 110px);
    line-height: 1;
    transition: transform 0.25s var(--bounce-spring);
    pointer-events: none;
  }

  /* Optional label under emoji */
  .card-label {
    font-size: clamp(13px, 3.2vw, 20px);
    font-weight: 800;
    color: #555;
    margin-top: 6px;
    pointer-events: none;
    text-align: center;
  }

  /* ===== Correct Animation ===== */
  .choice-card.correct {
    border-color: var(--correct-glow);
    animation: correctPop 0.6s var(--bounce-spring);
    background: #f0fff4;
  }
  @keyframes correctPop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.18) rotate(-4deg); }
    70%  { transform: scale(0.96) rotate(3deg); }
    100% { transform: scale(1); }
  }

  /* ===== Wrong Shake ===== */
  .choice-card.wrong {
    border-color: var(--wrong-shake);
    animation: wrongShake 0.5s ease;
  }
  @keyframes wrongShake {
    0%   { transform: translateX(0); }
    15%  { transform: translateX(-12px) rotate(-2deg); }
    30%  { transform: translateX(12px) rotate(2deg); }
    45%  { transform: translateX(-8px) rotate(-1deg); }
    60%  { transform: translateX(8px) rotate(1deg); }
    75%  { transform: translateX(-4px); }
    100% { transform: translateX(0); }
  }

  /* ===== Confetti Burst ===== */
  #confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 3px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ===== Celebration Overlay ===== */
  #celebration-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 900;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    background: transparent;
  }
  #celebration-overlay.show {
    opacity: 1;
    pointer-events: none;
  }
  .celebration-emoji {
    font-size: clamp(80px, 25vw, 160px);
    animation: celebBounce 0.5s var(--bounce-spring);
  }
  .celebration-text {
    font-size: clamp(32px, 9vw, 64px);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 4px 16px rgba(0,0,0,0.3);
    margin-top: 12px;
    animation: celebBounce 0.5s var(--bounce-spring) 0.1s both;
  }
  @keyframes celebBounce {
    0%   { transform: scale(0.3); opacity: 0; }
    70%  { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); }
  }

  /* ===== Restart Button (small, parent-facing) ===== */
  #restart-btn {
    z-index: 50;
    background: transparent;
    border: 2px solid #ddd;
    color: #bbb;
    font-size: 13px;
    font-weight: 700;
    border-radius: 20px;
    padding: 5px 16px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    font-family: inherit;
  }
  #restart-btn:hover { color: #888; border-color: #aaa; }
  #restart-btn:active { transform: scale(0.95); }

  /* ===== Progress Dots ===== */
  #progress-dots {
    display: flex;
    gap: 8px;
    z-index: 10;
    align-items: center;
    justify-content: center;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ddd;
    transition: background 0.3s, transform 0.3s var(--bounce-spring);
  }
  .dot.done { background: #FFD93D; transform: scale(1.2); }
  .dot.active { background: #6dd47e; transform: scale(1.4); }

  /* ===== Bottom Bar ===== */
  #bottom-bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 10;
    width: 100%;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <!-- Stars earned -->
  <div id="header">
    <!-- Stars will be injected here -->
  </div>

  <!-- Instruction banner -->
  <div id="instruction-box">
    <button id="speaker-btn" aria-label="חזור על ההוראה">🔊</button>
    <div id="instruction-text">טוען...</div>
  </div>

  <!-- Main choices grid -->
  <div id="choices-grid" class="cols-2" role="main" aria-label="בחר את האפשרות הנכונה"></div>

  <!-- Bottom area: progress + restart -->
  <div id="bottom-bar">
    <div id="progress-dots"></div>
    <button id="restart-btn">🔄 התחל מחדש</button>
  </div>
</div>

<!-- Confetti container -->
<div id="confetti-container"></div>

<!-- Celebration overlay -->
<div id="celebration-overlay">
  <div class="celebration-emoji" id="celeb-emoji">🎉</div>
  <div class="celebration-text" id="celeb-text">כל הכבוד!</div>
</div>

<script>
/* =====================================================
   גן החיות המקשיב – The Listening Zoo
   Hebrew toddler game (ages 1–3)
   ===================================================== */

// ── Audio context for simple tones (no external files) ──────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

/** Play a short musical chord / jingle */
function playSound(type) {
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();

    const now = ctx.currentTime;

    if (type === 'correct') {
      // Happy ascending notes
      const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
      notes.forEach((freq, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(freq, now + i * 0.1);
        g.gain.setValueAtTime(0, now + i * 0.1);
        g.gain.linearRampToValueAtTime(0.22, now + i * 0.1 + 0.04);
        g.gain.linearRampToValueAtTime(0, now + i * 0.1 + 0.28);
        o.start(now + i * 0.1);
        o.stop(now + i * 0.1 + 0.3);
      });
    } else if (type === 'wrong') {
      // Gentle low "oops" – two descending tones
      const notes = [440, 349.23]; // A4, F4
      notes.forEach((freq, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(freq, now + i * 0.18);
        g.gain.setValueAtTime(0, now + i * 0.18);
        g.gain.linearRampToValueAtTime(0.14, now + i * 0.18 + 0.04);
        g.gain.linearRampToValueAtTime(0, now + i * 0.18 + 0.28);
        o.start(now + i * 0.18);
        o.stop(now + i * 0.18 + 0.3);
      });
    } else if (type === 'star') {
      // Sparkle ping
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(1318.51, now);
      o.frequency.exponentialRampToValueAtTime(2637, now + 0.12);
      g.gain.setValueAtTime(0.2, now);
      g.gain.linearRampToValueAtTime(0, now + 0.25);
      o.start(now); o.stop(now + 0.3);
    }
  } catch(e) { /* silent fail on restricted browsers */ }
}

// ── Web Speech ───────────────────────────────────────────────────────────────
let speechSupported = 'speechSynthesis' in window;
let isSpeaking = false;
const speakerBtn = document.getElementById('speaker-btn');

function speak(text, onDone) {
  if (!speechSupported) { if (onDone) onDone(); return; }

  // Cancel any in-progress speech
  window.speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'he-IL';
  utter.rate = 0.82;
  utter.pitch = 1.15;
  utter.volume = 1;

  isSpeaking = true;
  speakerBtn.classList.add('speaking');

  utter.onend = () => {
    isSpeaking = false;
    speakerBtn.classList.remove('speaking');
    if (onDone) onDone();
  };
  utter.onerror = () => {
    isSpeaking = false;
    speakerBtn.classList.remove('speaking');
    if (onDone) onDone();
  };

  // Small delay helps mobile browsers
  setTimeout(() => window.speechSynthesis.speak(utter), 80);
}

// ── Game Data ────────────────────────────────────────────────────────────────
/*
  Each "round" has:
    instruction  – Hebrew sentence spoken aloud & shown on screen
    target       – the key of the correct item
    items        – array of items shown (2 or 3)

  Each item:
    key    – unique id
    emoji  – big emoji shown in card
    label  – short Hebrew word under emoji (optional but helpful for recognition)
    color  – soft background tint for this card
*/

const ROUNDS = [
  // ── Animals ──
  {

    items: [
      { key: 'dog',  emoji: '🐶', label: 'כלב',  color: '#fff9e6' },

    items: [
      { key: 'duck', emoji: '🦆', label: 'ברווז', color: '#e6f9ff' },
      { key: 'frog', emoji: '🐸', label: 'צפרדע', color: '#e6ffe9' },
    ]
  },
  {
    instruction: 'איפה הדג?',
    target: 'fish',
    items: [
      { key: 'fish', emoji: '🐟', label: 'דג',   color: '#e6f4ff' },
      { key: 'bird', emoji: '🐦', label: 'ציפור', color: '#fff0e6' },
    ]
  },
  {
    instruction: 'לחץ על האריה',
    target: 'lion',
    items: [
      { key: 'lion',  emoji: '🦁', label: 'אריה',  color: '#fff8e1' },
      { key: 'bear',  emoji: '🐻', label: 'דב',    color: '#fbeee0' },
      { key: 'bunny', emoji: '🐰', label: 'ארנב',  color: '#fce4ec' },
    ]
  },
  {
    instruction: 'איפה הפרה?',
    target: 'cow',
    items: [
      { key: 'horse', emoji: '🐴', label: 'סוס',  color: '#f5e6ff' },
      { key: 'cow',   emoji: '🐮', label: 'פרה',  color: '#fff8e1' },
    ]
  },
  {
    instruction: 'תגע בפנגווין',
    target: 'penguin',
    items: [
      { key: 'penguin', emoji: '🐧', label: 'פנגווין', color: '#e8eaf6' },
      { key: 'owl',     emoji: '🦉', label: 'ינשוף',   color: '#fff3e0' },
    ]
  },
  // ── Colors / Shapes ──
  {
    instruction: 'לחץ על הכדור האדום',
    target: 'red-ball',
    items: [
      { key: 'red-ball',    emoji: '🔴', label: 'אדום',   color: '#ffebee' },
      { key: 'blue-ball',   emoji: '🔵', label: 'כחול',   color: '#e3f2fd' },
      { key: 'green-ball',  emoji: '🟢', label: 'ירוק',   color: '#e8f5e9' },
    ]
  },
  {
    instruction: 'איפה הכוכב הצהוב?',
    target: 'star',
    items: [
      { key: 'heart',    emoji: '❤️', label: 'לב',    color: '#ffebee' },
      { key: 'star',     emoji: '⭐', label: 'כוכב',  color: '#fffde7' },
      { key: 'diamond',  emoji: '💎', label: 'יהלום', color: '#e3f2fd' },
    ]
  },
  {
    instruction: 'תגע בלב',
    target: 'heart',
    items: [
      { key: 'heart',  emoji: '💗', label: 'לב',     color: '#fce4ec' },
      { key: 'circle', emoji: '🟡', label: 'עיגול',  color: '#fffde7' },
    ]
  },
  // ── Food / Objects ──
  {
    instruction: 'לחץ על התפוח',
    target: 'apple',
    items: [
      { key: 'banana', emoji: '🍌', label: 'בננה', color: '#fffde7' },
      { key: 'apple',  emoji: '🍎', label: 'תפוח', color: '#ffebee' },
    ]
  },
  {
    instruction: 'איפה הכוס?',
    target: 'cup',
    items: [
      { key: 'ball', emoji: '⚽', label: 'כדור', color: '#f1f8e9' },
      { key: 'cup',  emoji: '🥛', label: 'כוס',  color: '#e3f2fd' },
      { key: 'star', emoji: '⭐', label: 'כוכב', color: '#fffde7' },
    ]
  },
  {
    instruction: 'לחץ על הכדור',
    target: 'ball',
    items: [
      { key: 'ball',    emoji: '🏀', label: 'כדור',  color: '#fff3e0' },
      { key: 'cake',    emoji: '🎂', label: 'עוגה',  color: '#fce4ec' },
    ]
  },
  // ── More animals ──
  {
    instruction: 'תגע בפיל',
    target: 'elephant',
    items: [
      { key: 'elephant', emoji: '🐘', label: 'פיל',   color: '#f3e5f5' },
      { key: 'giraffe',  emoji: '🦒', label: 'ג׳ירפה', color: '#fffde7' },
    ]
  },
  {
    instruction: 'לחץ על הנחש',
    target: 'snake',
    items: [
      { key: 'snake',    emoji: '🐍', label: 'נחש',   color: '#e8f5e9' },
      { key: 'butterfly',emoji: '🦋', label: 'פרפר',  color: '#f3e5f5' },
      { key: 'bee',      emoji: '🐝', label: 'דבורה', color: '#fffde7' },
    ]
  },
  {
    instruction: 'איפה הכבשה?',
    target: 'sheep',
    items: [
      { key: 'sheep', emoji: '🐑', label: 'כבשה', color: '#f5f5f5' },
      { key: 'pig',   emoji: '🐷', label: 'חזיר', color: '#fce4ec' },
    ]
  },
];

// Shuffle utility
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Game State ───────────────────────────────────────────────────────────────
let rounds = [];
let currentRound = 0;
let stars = 0;
let locked = false; // prevent double-taps during animation

function initGame() {
  rounds = shuffle([...ROUNDS]);
  currentRound = 0;
  stars = 0;
  locked = false;
  renderHeader();
  renderProgressDots();
  loadRound();
}

// ── Render Header (stars) ────────────────────────────────────────────────────
function renderHeader() {
  const header = document.getElementById('header');
  header.innerHTML = '';
  const max = Math.min(rounds.length, 10);
  for (let i = 0; i < stars; i++) {
    const s = document.createElement('div');
    s.className = 'star-badge';
    s.textContent = '⭐';
    header.appendChild(s);
  }
}

// ── Progress Dots ────────────────────────────────────────────────────────────
function renderProgressDots() {
  const dots = document.getElementById('progress-dots');
  dots.innerHTML = '';
  const total = Math.min(rounds.length, 10);
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < currentRound ? ' done' : '') + (i === currentRound ? ' active' : '');
    dots.appendChild(d);
  }
}

// ── Load Round ───────────────────────────────────────────────────────────────
function loadRound() {
  locked = false;

  if (currentRound >= rounds.length) {
    showFinalCelebration();
    return;
  }

  const round = rounds[currentRound];
  renderProgressDots();

  // Instruction
  document.getElementById('instruction-text').textContent = round.instruction;

  // Build grid
  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  grid.className = 'choices-grid ' + (round.items.length === 3 ? 'cols-3' : 'cols-2');

  // Shuffle items for each display
  const shuffledItems = shuffle(round.items);

  shuffledItems.forEach(item => {
    const card = document.createElement('div');
    card.className = 'choice-card';
    card.setAttribute('data-key', item.key);
    card.setAttribute('role', 'button');
    card.setAttribute('aria-label', item.label);
    card.style.background = item.color || '#fff';

    const emo = document.createElement('div');
    emo.className = 'card-emoji';
    emo.textContent = item.emoji;

    const lbl = document.createElement('div');
    lbl.className = 'card-label';
    lbl.textContent = item.label;

    card.appendChild(emo);
    card.appendChild(lbl);

    // Tap handler
    card.addEventListener('pointerdown', () => handleTap(item.key, card, round));

    // Entrance animation stagger
    card.style.opacity = '0';
    card.style.transform = 'scale(0.7)';
    card.style.transition = 'opacity 0.3s ease, transform 0.4s var(--bounce-spring)';
    grid.appendChild(card);
  });

  // Stagger entrance
  const cards = grid.querySelectorAll('.choice-card');
  cards.forEach((c, i) => {
    setTimeout(() => {
      c.style.opacity = '1';
      c.style.transform = 'scale(1)';
    }, 80 + i * 80);
  });

  // Speak after cards appear
  setTimeout(() => speak(round.instruction), 400);
}

// ── Handle Tap ───────────────────────────────────────────────────────────────
function handleTap(tappedKey, card, round) {
  if (locked) return;
  locked = true;

  if (tappedKey === round.target) {
    handleCorrect(card);
  } else {
    handleWrong(card, round);
  }
}

function handleCorrect(card) {
  playSound('correct');
  card.classList.add('correct');
  stars++;

  // Burst confetti
  burstConfetti(card);

  // Show celebration overlay briefly
  showCelebration();

  // Add star to header after short delay
  setTimeout(() => {
    renderHeader();
    // Pop the last star
    const header = document.getElementById('header');
    const allStars = header.querySelectorAll('.star-badge');
    if (allStars.length > 0) {
      playSound('star');
      allStars[allStars.length - 1].classList.add('pop');
    }
  }, 200);

  setTimeout(() => {
    hideCelebration();
    currentRound++;
    loadRound();
  }, 1800);
}

function handleWrong(card, round) {
  playSound('wrong');
  card.classList.add('wrong');

  setTimeout(() => {
    card.classList.remove('wrong');
    locked = false;
    // Repeat instruction gently
    speak(round.instruction);
  }, 600);
}

// ── Celebration Overlay ──────────────────────────────────────────────────────
const CELEBRATE_TEXTS = ['כל הכבוד! 🎉', 'יופי! 🌟', 'מעולה! 🥳', 'נכון! ✨', 'אחלה! 🎊'];
const CELEBRATE_EMOJIS = ['🎉', '⭐', '🥳', '🌈', '🎊', '❤️'];

function showCelebration() {
  const overlay = document.getElementById('celebration-overlay');
  document.getElementById('celeb-emoji').textContent =
    CELEBRATE_EMOJIS[Math.floor(Math.random() * CELEBRATE_EMOJIS.length)];
  document.getElementById('celeb-text').textContent =
    CELEBRATE_TEXTS[Math.floor(Math.random() * CELEBRATE_TEXTS.length)];
  overlay.classList.add('show');
}

function hideCelebration() {
  document.getElementById('celebration-overlay').classList.remove('show');
}

// ── Confetti ─────────────────────────────────────────────────────────────────
const CONFETTI_COLORS = ['#FFD93D','#FF6B6B','#6dd47e','#4ECDC4','#C77DFF','#FF9A3C','#FF6EB4'];

function burstConfetti(originCard) {
  const container = document.getElementById('confetti-container');
  const rect = originCard.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const count = 28;

  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = CONFETTI_COLORS[i % CONFETTI_COLORS.length];
    piece.style.background = color;
    piece.style.left = (cx + (Math.random() - 0.5) * 120) + 'px';
    piece.style.top = cy + 'px';
    piece.style.width = (8 + Math.random() * 10) + 'px';
    piece.style.height = (8 + Math.random() * 10) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
    const dur = 0.9 + Math.random() * 0.8;
    const delay = Math.random() * 0.25;
    piece.style.animation = `confettiFall ${dur}s ${delay}s linear forwards`;
    container.appendChild(piece);
    setTimeout(() => piece.remove(), (dur + delay) * 1000 + 100);
  }
}

// ── Final Celebration ────────────────────────────────────────────────────────
function showFinalCelebration() {
  locked = true;
  document.getElementById('instruction-text').textContent = '🎊 כל הכבוד! סיימת! 🎊';
  document.getElementById('choices-grid').innerHTML = '';
  document.getElementById('progress-dots').innerHTML = '';

  // Make final big star
  const grid = document.getElementById('choices-grid');
  const wrap = document.createElement('div');
  wrap.style.cssText = `
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; gap:20px;
  `;
  wrap.innerHTML = `
    <div style="font-size:clamp(80px,22vw,160px);animation:correctPop 0.7s var(--bounce-spring);">🏆</div>
    <div style="font-size:clamp(26px,7vw,48px);font-weight:900;color:#555;text-align:center;">
      גמרת את כל הסיבובים!<br>אלוף אמיתי! ⭐
    </div>
  `;
  grid.appendChild(wrap);
  grid.className = 'choices-grid cols-2';

  // Big confetti burst
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const fakeCard = { getBoundingClientRect: () => ({
        left: window.innerWidth * Math.random(),
        top: window.innerHeight * 0.3,
        width: 1, height: 1
      })};
      burstConfetti(fakeCard);
    }, i * 400);
  }

  playSound('correct');
  speak('כל הכבוד! סיימת את כל הסיבובים! אתה אלוף!');
}

// ── Speaker Button ───────────────────────────────────────────────────────────
speakerBtn.addEventListener('click', () => {
  if (currentRound < rounds.length) {
    speak(rounds[currentRound].instruction);
  }
});

// ── Restart Button ───────────────────────────────────────────────────────────
document.getElementById('restart-btn').addEventListener('click', () => {
  window.speechSynthesis && window.speechSynthesis.cancel();
  initGame();
});

// ── Unlock audio on first tap (iOS restriction) ──────────────────────────────
document.addEventListener('pointerdown', () => {
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
  } catch(e) {}
}, { once: true });

// ── Start ────────────────────────────────────────────────────────────────────
initGame();
</script>
</body>
